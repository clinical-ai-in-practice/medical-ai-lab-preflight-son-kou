# Teaching pack source configuration
#
# The instructor sets one of the following before distributing this repository.
# Students: you do not need to edit this file unless your instructor says to.
#
# ── Option A: Download URL (recommended for classroom use) ──────────────────
# The instructor will replace the line below with a real URL before
# distributing the template. Students just run: make fetch-sample
#
# url = PLACEHOLDER_INSTRUCTOR_WILL_SET_THIS
#
# ── Option B: Local path (for offline / lab machine setups) ────────────────
# If the instructor placed the pack on a shared drive or course server,
# uncomment and fill in:
#
# path = /path/to/teaching_pack/
#
# ── Environment variable overrides ─────────────────────────────────────────
# You can also skip this file entirely by setting an env var in your shell:
#   export TEACHING_PACK_URL=https://...
#   export TEACHING_PACK_PATH=/path/to/...
#
# ── Troubleshooting ────────────────────────────────────────────────────────
# If make fetch-sample fails with "No teaching pack source configured",
# contact your instructor to get the teaching pack URL.
