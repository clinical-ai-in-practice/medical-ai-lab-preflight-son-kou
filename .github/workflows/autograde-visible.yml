name: visible-autograding

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run visible autograding tests
        run: pytest -q tests/

      - name: Upload student artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: student-artifacts-${{ github.sha }}
          path: |
            outputs/
            reports/
          retention-days: 30
