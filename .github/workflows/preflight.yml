name: preflight

# Runs on every push to main.
# Checks that the environment and scaffolding are intact — no data required.
# Students can also run this locally: make preflight

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bootstrap environment
        run: python scripts/bootstrap.py

      - name: Structural preflight checks
        run: pytest -q tests/test_preflight.py tests/test_scripts_exist.py
